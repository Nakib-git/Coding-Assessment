<section class="page">

  <header class="form-header">
    <h2>{{ isEditMode ? 'Edit User' : 'Create New User' }}</h2>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="user-form">

    <!-- Name -->
    <div class="form-group">
      <label for="name">Full Name <span class="required">*</span></label>
      <input
        id="name"
        type="text"
        formControlName="name"
        class="form-control"
        [class.is-invalid]="f['name'].invalid && f['name'].touched"
        placeholder="e.g. Nakib"
      />
      <div class="invalid-feedback" *ngIf="f['name'].errors?.['required']">Name is required.</div>
      <div class="invalid-feedback" *ngIf="f['name'].errors?.['maxlength']">Max 100 characters.</div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email <span class="required">*</span></label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="form-control"
        [class.is-invalid]="f['email'].invalid && f['email'].touched"
        placeholder="e.g. nakib@company.com"
      />
      <div class="invalid-feedback" *ngIf="f['email'].errors?.['required']">Email is required.</div>
      <div class="invalid-feedback" *ngIf="f['email'].errors?.['email']">Enter a valid email address.</div>
      <div class="invalid-feedback" *ngIf="f['email'].errors?.['maxlength']">Max 200 characters.</div>
    </div>

    <!-- Role -->
    <div class="form-group">
      <label for="role">Role <span class="required">*</span></label>
      <input
        id="role"
        type="text"
        formControlName="role"
        class="form-control"
        [class.is-invalid]="f['role'].invalid && f['role'].touched"
        placeholder="e.g. Admin, Manager, User"
      />
      <div class="invalid-feedback" *ngIf="f['role'].errors?.['required']">Role is required.</div>
      <div class="invalid-feedback" *ngIf="f['role'].errors?.['maxlength']">Max 50 characters.</div>
    </div>

    <!-- Is Active -->
    <div class="form-group form-check-group">
      <label class="check-label">
        <input
          id="isActive"
          type="checkbox"
          formControlName="isActive"
          class="form-check-input"
        />
        Active user
      </label>
      <span class="hint">Inactive users cannot log in to the system.</span>
    </div>

    <!-- Server error -->
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Actions -->
    <div class="form-actions">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid || isSubmitting"
      >
        {{ isSubmitting ? 'Saving…' : (isEditMode ? 'Update User' : 'Create User') }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </div>

  </form>

</section>
